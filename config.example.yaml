server:
  # Default to loopback. Only expose externally if you have set a real api_key
  # AND you understand that every configured tool (ssh, file_write, etc.) can
  # be driven by anyone who reaches this port.
  host: "127.0.0.1"
  port: 8000
  # REQUIRED unless server.allow_unauthenticated: true (loopback only).
  # Generate one with e.g. `python -c "import secrets; print(secrets.token_urlsafe(32))"`.
  api_key: ""
  # Set true ONLY for a single-user loopback deployment with no real api_key.
  # The server refuses to start with a non-loopback host + allow_unauthenticated,
  # unless allow_unauthenticated_public: true is also set (accepting full risk).
  # allow_unauthenticated: false
  # Cross-origin allowlist. Empty/omitted → no CORS middleware (same-origin only).
  # cors_origins: ["https://aurora.example.com"]
  # Enable the OpenAI-compatible /v1 router (off by default; requires api_key).
  # enable_openai_compat: false

# ─── Model Providers ────────────────────────────────────────────────────────
# Configure at least one. Models are referenced as "provider/model-id".
providers:
  # recommended models: gemma4, qwen3.5, gpt-oss
  ollama:
    enabled: true
    base_url: "http://localhost:11434"
    default_model: "qwen3.5:latest"

  anthropic:
    enabled: false
    api_key: ""   # or set ANTHROPIC_API_KEY env var
    default_model: "claude-sonnet-4-6"

  openai:
    enabled: false
    api_key: ""   # or set OPENAI_API_KEY env var
    base_url: "https://api.openai.com/v1"
    default_model: "gpt-4o"

  gemini:
    enabled: false
    api_key: ""   # or set GEMINI_API_KEY env var
    # Uses Google's OpenAI-compatible endpoint automatically
    default_model: "gemini-1.5-pro"

  # Any OpenAI-compatible endpoint: vLLM, LM Studio, LiteLLM, etc.
  custom: []
  # custom:
  #   - name: "my-vllm"
  #     enabled: true
  #     base_url: "http://gpu-server:8080/v1"
  #     api_key: ""
  #     default_model: "Meta-Llama-3.1-70B-Instruct"

# Global default — format: "provider/model-id"
default_model: "anthropic/claude-sonnet-4-6"

# ─── Tools ──────────────────────────────────────────────────────────────────
tools:
  # ── Server Probe ─────────────────────────────────────────────────────────
  # Probe servers for connectivity (ping) and SSH access.
  # Reuses the hosts defined in the ssh section above.
  server_probe:
    enabled: false
    # enable_ssh_probe: true  # Uncomment to also test SSH connectivity/auth

  # ── SSH ─────────────────────────────────────────────────────────────────
  ssh:
    enabled: false

    # Global write permission (default: false = read-only for all hosts).
    # Set to true to allow the agent to run state-changing commands when
    # the user explicitly requests it. Can be overridden per host below.
    allow_writes: false

    hosts: []
    # Example hosts:
    # hosts:
    #   - name: "web-01"          # Friendly name used in tool calls
    #     host: "10.0.0.10"
    #     port: 22
    #     user: "aurora"
    #     key_file: "~/.ssh/id_ed25519"
    #     # allow_writes: true    # Override for this host only
    #
    #   - name: "db-01"
    #     host: "10.0.0.20"
    #     user: "root"
    #     key_file: "~/.ssh/id_ed25519"

  # ── SCP Upload ─────────────────────────────────────────────────────────
  # Upload files from ./files/ sandbox to remote servers via SCP.
  # Reuses the hosts defined in the ssh section above.
  scp_upload:
    enabled: false

  # ── Web search & fetch ───────────────────────────────────────────────────
  websearch:
    enabled: true
    max_results: 5
    fetch_content: true         # Extract page text from top search results
    max_content_length: 4000    # Characters per page

    # Domains the agent may fetch directly (without a search query).
    # null or omitted = use the built-in default list.
    # Set to [] to disable direct URL fetching.
    # Add your own domains to extend the defaults.
    whitelist: null
    # whitelist:
    #   - github.com
    #   - docs.python.org
    #   - wiki.archlinux.org
    #   - nvd.nist.gov
    #   - your-internal-wiki.example.com   # internal docs

  # ── RSS feed reader ──────────────────────────────────────────────────────
  rss:
    enabled: true
    max_items: 10               # Default items returned per feed
    # extra_feeds:              # Add custom feeds (name: url)
    #   my_blog: "https://example.com/feed.xml"
    #   lwn_weekly: "https://lwn.net/headlines/weekly/rss"

  # ── Weather forecast ─────────────────────────────────────────────────────
  weather:
    enabled: true
    default_forecast_days: 3    # Number of forecast days to return (1–16)

# ─── Memory ─────────────────────────────────────────────────────────────────
memory:
  enabled: true
  db_path: "~/.local/share/aurora/memory.db"
  auto_save_prompt: true
  max_injected_solutions: 3

# ─── Agent Behaviour ────────────────────────────────────────────────────────
agent:
  max_tool_iterations: 15
  tool_timeout_seconds: 60
  # Auto-learn: extract and save solutions from tool-use conversations.
  # The agent makes a background LLM call after each tool-using turn to
  # decide if the interaction is worth remembering.
  auto_learn: false
  # Extra instructions appended to the system prompt (optional)
  system_prompt_extra: ""
